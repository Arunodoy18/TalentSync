name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint (no warnings)
        run: npm run lint -- --max-warnings=0

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-key
          OPENAI_API_KEY: dummy-key
          SUPABASE_SERVICE_ROLE_KEY: dummy-key
          RAZORPAY_KEY_ID: dummy-key
          RAZORPAY_KEY_SECRET: dummy-secret
          RAZORPAY_WEBHOOK_SECRET: dummy-secret
          INTERNAL_ADMIN_TOKEN: dummy-token

  backend-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Backend typecheck
        working-directory: backend
        run: npm run typecheck

      - name: Backend tests
        working-directory: backend
        run: npm test

  python-services-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python service dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ai-service/requirements.txt
          pip install -r matching-engine/requirements.txt
          pip install -r scraper/requirements.txt
          pip install -r automation/requirements.txt
          pip install -r notifications/requirements.txt
          pip install -r analytics/requirements.txt
          pip install -r payments/requirements.txt
          pip install -r webhooks/requirements.txt
          pip install -r admin-panel/requirements.txt

      - name: Python syntax check
        run: |
          python -m py_compile ai-service/app/main.py ai-service/app/pipeline.py ai-service/app/schemas.py
          python -m py_compile matching-engine/app/main.py
          python -m py_compile scraper/app/main.py scraper/app/queue.py scraper/app/worker.py
          python -m py_compile automation/app/main.py automation/app/queue.py automation/app/worker.py
          python -m py_compile notifications/app/main.py notifications/app/adapters.py notifications/app/retry.py notifications/app/audit.py
          python -m py_compile analytics/app/main.py payments/app/main.py webhooks/app/main.py admin-panel/app/main.py

  compose-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose config
        working-directory: infrastructure
        run: docker compose -f docker-compose.microservices.yml config

  integration-smoke:
    runs-on: ubuntu-latest
    needs: [backend-validate, python-services-validate, compose-validate]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure smoke script executable
        run: chmod +x .github/scripts/integration-smoke.sh

      - name: Run integration smoke checks
        run: .github/scripts/integration-smoke.sh

  backend-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Fail on high/critical vulnerabilities
        working-directory: backend
        run: npm audit --omit=dev --audit-level=high
