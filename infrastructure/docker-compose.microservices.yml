services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: talentsync-postgres
    environment:
      POSTGRES_DB: talentsync
      POSTGRES_USER: talentsync
      POSTGRES_PASSWORD: talentsync
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: talentsync-redis
    ports:
      - "6379:6379"

  backend-api:
    build:
      context: ../backend
    container_name: talentsync-backend-api
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://talentsync:talentsync@postgres:5432/talentsync
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai-service:8001
      MATCHING_ENGINE_URL: http://matching-engine:8002
      AUTOMATION_SERVICE_URL: http://automation:8004
      BACKEND_JWT_SECRET: dev-only-secret-change-me
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "4000:4000"

  backend-outbox-worker:
    build:
      context: ../backend
    container_name: talentsync-outbox-worker
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://talentsync:talentsync@postgres:5432/talentsync
      REDIS_URL: redis://redis:6379
    command: ["npm", "run", "worker:outbox"]

  ai-service:
    build:
      context: ../ai-service
    container_name: talentsync-ai-service
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://talentsync:talentsync@postgres:5432/talentsync
      REDIS_URL: redis://redis:6379
    ports:
      - "8001:8001"

  matching-engine:
    build:
      context: ../matching-engine
    container_name: talentsync-matching-engine
    depends_on:
      - postgres
      - redis
    ports:
      - "8002:8002"

  scraper:
    build:
      context: ../scraper
    container_name: talentsync-scraper
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379
      SCRAPE_SCHEDULER_ENABLED: ${SCRAPE_SCHEDULER_ENABLED:-true}
      SCRAPE_SCHEDULE_SECONDS: ${SCRAPE_SCHEDULE_SECONDS:-21600}
      SCRAPE_SOURCES: ${SCRAPE_SOURCES:-remoteok,greenhouse,linkedin,indeed}
      SCRAPE_DEFAULT_LOCATION: ${SCRAPE_DEFAULT_LOCATION:-}
      APIFY_TOKEN: ${APIFY_TOKEN:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
    ports:
      - "8003:8003"

  scraper-worker:
    build:
      context: ../scraper
    container_name: talentsync-scraper-worker
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379
      APIFY_TOKEN: ${APIFY_TOKEN:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
    command: ["python", "-m", "app"]

  automation:
    build:
      context: ../automation
    container_name: talentsync-automation
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - "8004:8004"

  automation-worker:
    build:
      context: ../automation
    container_name: talentsync-automation-worker
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379
    command: ["python", "-m", "app"]

  notifications:
    build:
      context: ../notifications
    container_name: talentsync-notifications
    depends_on:
      - redis
    ports:
      - "8005:8005"

  analytics:
    build:
      context: ../analytics
    container_name: talentsync-analytics
    depends_on:
      - postgres
      - redis
    ports:
      - "8006:8006"

  payments:
    build:
      context: ../payments
    container_name: talentsync-payments
    depends_on:
      - postgres
      - redis
    ports:
      - "8007:8007"

  webhooks:
    build:
      context: ../webhooks
    container_name: talentsync-webhooks
    depends_on:
      - postgres
      - redis
    ports:
      - "8008:8008"

  admin-panel:
    build:
      context: ../admin-panel
    container_name: talentsync-admin-panel
    depends_on:
      - backend-api
    ports:
      - "4100:4100"

volumes:
  postgres_data:
